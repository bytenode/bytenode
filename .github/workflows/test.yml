# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest]

    # run pre-flight tests on ubuntu, instead of full OS support matrix, to reduce costs
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-${{ matrix.node-version }}-
      - name: Install Packages
        run: npm install
      # The electronMain tests launch a real Electron browser process, which
      # needs a display on Linux. Provide a virtual one via Xvfb.
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Run Tests
        run: xvfb-run --auto-servernum npm test
